aid: fordpass
name: FordPass / Ford Pro
description: >-
  FordPass is Ford Motor Company's consumer connected-vehicle mobile app and
  service platform for Ford and Lincoln owners, exposing remote start/stop,
  remote lock/unlock, vehicle status (fuel/charge, tire pressure, oil life,
  odometer, location), Vehicle Health alerts, BlueCruise hands-free driving,
  Wi-Fi hotspot, Phone As A Key, scheduled service, and roadside assistance via
  the embedded FordPass Connect 4G LTE modem. Ford Pro is Ford's commercial
  fleet brand spanning Ford Pro Telematics, Ford Pro Intelligence, Ford Pro
  E-Telematics for EVs, Ford Pro Charging, Ford Pro FinSimple, and dealer/upfit
  services. The Ford Developer Marketplace (developer.ford.com) hosts Ford's
  partner-facing API program — FordConnect Query API for consumer-vehicle data
  and remote command access (with vehicle-owner consent via FordPass account
  OAuth), plus a Ford Pro REST API surface for fleets including Vehicle
  Status, Vehicle Historical Status, Vehicle Metadata, Vehicle Efficiency
  (fuel/energy/idle), Driver Behavior, Trip Reports, and Vehicle Health.
  Ford Pro Telematics is integrated with Geotab, Fleetio, Samsara, Motive,
  Verizon Connect, and other fleet platforms, and Smartcar offers a consumer
  OAuth bridge to Ford vehicles using FordPass Connect credentials. Access to
  Ford APIs is gated behind a partner application and credentials issued
  through the Ford Developer Portal; Ford has periodically restricted
  individual-developer access. No public OpenAPI specification is published
  outside the partner portal, so this profile documents the Ford developer
  surface as an index without a generated machine-readable contract.
